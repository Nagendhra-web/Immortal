apiVersion: v1
kind: Service
metadata:
  name: {{ include "immortal-operator.fullname" . }}
  labels:
    {{- include "immortal-operator.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.apiPort }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "immortal-operator.selectorLabels" . | nindent 4 }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "immortal-operator.fullname" . }}-data
  labels:
    {{- include "immortal-operator.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}
{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "immortal-operator.fullname" . }}
  labels:
    {{- include "immortal-operator.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "immortal-operator.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: api
      path: /api/metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
