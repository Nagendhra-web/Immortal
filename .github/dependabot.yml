version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, go]
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: npm
    directory: /landing-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, landing-ui]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    ignore:
      # React 19 peers; pinning is fine.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: pip
    directory: /sdk/python
    schedule:
      interval: monthly
    labels: [dependencies, python-sdk]

  - package-ecosystem: npm
    directory: /sdk/typescript
    schedule:
      interval: monthly
    labels: [dependencies, typescript-sdk]
