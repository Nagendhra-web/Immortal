name: pages

on:
  push:
    branches: [main]
    paths:
      - "landing-ui/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: landing-ui/package-lock.json

      - name: Install deps
        working-directory: landing-ui
        run: npm ci

      - name: Build for Pages
        working-directory: landing-ui
        env:
          VITE_TARGET: pages
        run: npm run build

      - name: SPA 404 fallback
        run: cp landing-ui/dist/index.html landing-ui/dist/404.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: landing-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
